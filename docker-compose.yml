services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy-network
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=ton@email.com
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./traefik.yml:/traefik.yml:ro
    networks:
      - proxy-network

  uckin-web:
    build:
      context: ./my-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_AUTH_SERVICE_URL=${AUTH_PUBLIC_URL}
    container_name: uckin-web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=https://uckin.ac.cd
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_SERVICE_INTERNAL_URL=http://auth-service:4000
      - PORTAL_INTERNAL_URL=http://uckin-portal:3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uckin-web.rule=Host(`uckin.ac.cd`)"
      - "traefik.http.routers.uckin-web.entrypoints=web,websecure"
      - "traefik.http.routers.uckin-web.tls.certresolver=myresolver"
    networks:
      - proxy-network

  uckin-portal:
    build:
      context: ./espace-etudiant
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_AUTH_SERVICE_URL=${AUTH_PUBLIC_URL}
        - NEXT_PUBLIC_MAIN_SITE_URL=${MAIN_SITE_URL}
    container_name: uckin-portal
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - auth-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uckin-portal.rule=Host(`portal.uckin.ac.cd`)"
      - "traefik.http.routers.uckin-portal.entrypoints=web,websecure"
      - "traefik.http.routers.uckin-portal.tls.certresolver=myresolver"
    networks:
      - proxy-network

  postgres:
    image: postgres:16-alpine
    container_name: uckin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uckin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uckin_password@@@}
      POSTGRES_DB: ${POSTGRES_DB:-uckin_auth}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uckin_user -d uckin_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: uckin-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  auth-service:
    build:
      context: ./Auth
      dockerfile: Dockerfile
    container_name: uckin-auth
    restart: unless-stopped
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-uckin_user}:${POSTGRES_PASSWORD:-uckin_password}@postgres:5432/${POSTGRES_DB:-uckin_auth}
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem
      BCRYPT_SALT_ROUNDS: 12
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: "true"
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./Auth/keys:/app/keys:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uckin-auth.rule=Host(`api.uckin.ac.cd`)"
      - "traefik.http.routers.uckin-auth.entrypoints=web,websecure"
      - "traefik.http.routers.uckin-auth.tls.certresolver=myresolver"
    networks:
      - proxy-network
      - internal

networks:
  proxy-network:
    external: true
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
