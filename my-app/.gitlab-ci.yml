stages:
  - install
  - build
  - publish

variables:
  NODE_ENV: production
  DOCKER_TLS_CERTDIR: ""
  APP_ENV: production

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

install_dependencies:
  image: node:20-alpine
  stage: install
  script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
  retry: 2

frontend_build:
  image: node:20-alpine
  stage: build
  script:
    - npm install -g pnpm
    - pnpm run build
  artifacts:
    paths:
      - .next/
      - out/
      - node_modules/
      - public/
      - package.json
      - next.config.ts
      - tsconfig.json

docker_build:
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  stage: publish
  before_script:
    - apk add --no-cache curl
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  only:
    - main

deploy_production:
  image: alpine:3.19
  stage: publish
  before_script:
    - apk add --no-cache openssh-client sshpass
    - mkdir -p ~/.ssh
    - echo "SSH_HOST=$SSH_HOST"
    - apk add --no-cache netcat-openbsd
    - nc -zv "$SSH_HOST" 22 || echo "Port 22 fermé ou inaccessible"
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      sshpass -p "$SSH_PASSWORD" ssh "$SSH_USER@$SSH_HOST" bash << ENDSSH
        docker login registry.gitlab.com -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD}
        cd /docker/uckin-web
        docker compose pull
        docker compose up -d --force-recreate
      ENDSSH
  needs:
    - docker_build
  only:
    - main

