services:
  uckin-web:
    image: registry.gitlab.com/uckin/uckin-web:latest
    container_name: uckin-web
    restart: always
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uckin-web.rule=Host(`uckin.ac.cd`)"
      - "traefik.http.routers.uckin-web.entrypoints=websecure"
      - "traefik.http.routers.uckin-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.uckin-web.loadbalancer.server.port=80"
    networks:
      - traefik-proxy
      - internal

networks:
  traefik-proxy:
    external: true
  internal:
    driver: bridge
    internal: true