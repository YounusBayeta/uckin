# Configuration statique Traefik (traefik.yml)
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: proxy-network

api:
  dashboard: true

certificatesResolvers:
  myresolver:
    acme:
      email: "ton@email.com"
      storage: "/letsencrypt/acme.json"
      tlsChallenge: true
